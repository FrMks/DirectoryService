services:
  directory-service:
    build:
      context: .
      dockerfile: src/Dockerfile
      args:
        GITHUB_PACKAGES_USERNAME: ${GITHUB_PACKAGES_USERNAME}
        GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DirectoryServiceDb: Server=postgres;Port=5432;Database=directory_service_db;User Id=postgres;Password=postgres;
      ConnectionStrings__Seq: http://seq:5341
      ConnectionStrings__Redis: redis:6379
      ConnectionStrings__Minio: http://minio:9000
      Swagger__ServerUrl: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: directory_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d directory_service_db"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINUSERNAME: "admin"
      SEQ_FIRSTRUN_ADMINPASSWORD: "YourStrong!Pass1"
    ports:
      - "8082:80"
      - "5431:5341"
    volumes:
      - seq-data:/data

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    container_name: minio-file-service
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    restart: always
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  file-service:
    build:
      context: .
      dockerfile: src/FileService/FileService.Web/Dockerfile
      args:
        GITHUB_PACKAGES_USERNAME: ${GITHUB_PACKAGES_USERNAME}
        GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__FileServiceDb: Server=postgres;Port=5432;Database=file_service_db;User Id=postgres;Password=postgres;
      ConnectionStrings__Seq: http://seq:5341
      S3Options__Endpoint: http://minio:9000
      S3Options__AccessKey: ${MINIO_ROOT_USER}
      S3Options__SecretKey: ${MINIO_ROOT_PASSWORD}
      S3Options__WithSsl: "false"
      S3Options__RequiredBuckets__0: videos
      S3Options__RequiredBuckets__1: preview
      Swagger__ServerUrl: http://localhost:8081
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      seq:
        condition: service_started

volumes:
  postgres-data:
  seq-data:
  minio-data:
